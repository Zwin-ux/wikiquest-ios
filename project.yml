name: WikiQuest
options:
  bundleIdPrefix: com.wikiquest
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: 5.43.0
targets:
  WikiQuest:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wikiquest.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/WikiQuest.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: iPhone Distribution
        PROVISIONING_PROFILE_SPECIFIER: "$(IOS_PROVISIONING_PROFILE_SPECIFIER)"
    dependencies:
      - target: WikiQuestWidgets
        embed: true
      - target: WikiQuestClip
        embed: true
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
  WikiQuestWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - WidgetExtension
      - Sources/Shared
      - Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wikiquest.app.widgets
        INFOPLIST_FILE: WidgetExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: WidgetExtension/WikiQuestWidgets.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: iPhone Distribution
        PROVISIONING_PROFILE_SPECIFIER: "$(IOS_WIDGETS_PROVISIONING_PROFILE_SPECIFIER)"
  WikiQuestClip:
    type: application.on-demand-install-capable
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - AppClip
      - Sources/Shared/ClipQuest.swift
      - Sources/Core/AppClipQuestSupport.swift
      - Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wikiquest.app.Clip
        INFOPLIST_FILE: AppClip/Info.plist
        CODE_SIGN_ENTITLEMENTS: AppClip/WikiQuestClip.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: iPhone Distribution
        PROVISIONING_PROFILE_SPECIFIER: "$(IOS_APP_CLIP_PROVISIONING_PROFILE_SPECIFIER)"
  WikiQuestTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/WikiQuestTests
    dependencies:
      - target: WikiQuest
  WikiQuestUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/WikiQuestUITests
    dependencies:
      - target: WikiQuest
  WikiQuestClipUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/WikiQuestClipUITests
    dependencies:
      - target: WikiQuestClip
schemes:
  WikiQuest:
    build:
      targets:
        WikiQuest: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WikiQuestTests
        - WikiQuestUITests
    archive:
      config: Release
  WikiQuestClip:
    build:
      targets:
        WikiQuestClip: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WikiQuestClipUITests
