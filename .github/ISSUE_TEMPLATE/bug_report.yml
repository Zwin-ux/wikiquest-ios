name: Bug report
description: Report a reproducible WikiQuest iOS problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the issue and the expected behavior.
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and iOS version
      placeholder: iPhone 15, iOS 18.5
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open Mystery\n2. Reveal clue\n3. ..."
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Screenshots or video
      description: Add visual evidence when the issue is UI-related.
