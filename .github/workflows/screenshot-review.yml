name: Screenshot Review

on:
  workflow_dispatch:
    inputs:
      device_name:
        description: "Preferred iOS Simulator device for screenshot review"
        required: true
        default: "iPhone SE (3rd generation)"
        type: string

jobs:
  capture:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Node dependencies
        run: |
          corepack enable
          corepack pnpm@10 install --frozen-lockfile

      - name: Verify generated assets
        run: |
          corepack pnpm@10 run assets:wikiquest
          corepack pnpm@10 run typecheck

      - name: Select Xcode
        run: |
          XCODE_PATH="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' | sort | tail -n 1)"
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version
          xcodebuild -showsdks
          if ! xcodebuild -showsdks | grep -Eq "iphoneos26|iOS 26"; then
            echo "App Store Connect now requires uploads built with the iOS 26 SDK or later."
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate --spec project.yml

      - name: Resolve screenshot simulator
        id: screenshot-destination
        env:
          DEVICE_NAME: ${{ inputs.device_name }}
        run: |
          destinations="$(xcodebuild -project WikiQuest.xcodeproj -scheme WikiQuest -showdestinations 2>/dev/null || true)"
          line="$(printf "%s\n" "$destinations" | grep 'platform:iOS Simulator' | grep -F "name:$DEVICE_NAME" | head -n 1 || true)"
          if [ -z "$line" ]; then
            line="$(printf "%s\n" "$destinations" | grep 'platform:iOS Simulator' | grep -i 'iPhone SE' | head -n 1 || true)"
          fi
          if [ -z "$line" ]; then
            line="$(printf "%s\n" "$destinations" | grep 'platform:iOS Simulator' | grep 'iPhone' | grep -v 'Any iOS Simulator Device' | head -n 1 || true)"
          fi
          if [ -n "$line" ]; then
            simulator_id="$(printf "%s" "$line" | sed -E 's/.*id:([^,}]+).*/\1/' | xargs)"
          else
            device_type="$(xcrun simctl list devicetypes | grep -F "$DEVICE_NAME" | sed -E 's/.*\((com\.apple\.CoreSimulator\.SimDeviceType\.[^)]+)\).*/\1/' | head -n 1)"
            if [ -z "$device_type" ]; then
              device_type="$(xcrun simctl list devicetypes | grep -F 'iPhone SE' | sed -E 's/.*\((com\.apple\.CoreSimulator\.SimDeviceType\.[^)]+)\).*/\1/' | head -n 1)"
            fi
            if [ -z "$device_type" ]; then
              device_type="$(xcrun simctl list devicetypes | grep -F 'iPhone' | sed -E 's/.*\((com\.apple\.CoreSimulator\.SimDeviceType\.[^)]+)\).*/\1/' | head -n 1)"
            fi
            runtime_id="$(xcrun simctl list runtimes | grep '^iOS ' | grep -v unavailable | sed -E 's/.* - (com\.apple\.CoreSimulator\.SimRuntime\.[^ ]+).*/\1/' | tail -n 1)"
            if [ -z "$device_type" ] || [ -z "$runtime_id" ]; then
              echo "Available destinations:"
              printf "%s\n" "$destinations"
              echo "Available iOS runtimes:"
              xcrun simctl list runtimes | grep '^iOS ' || true
              echo "Could not resolve a concrete iOS Simulator for screenshot review."
              exit 1
            fi
            simulator_id="$(xcrun simctl create "WikiQuest Screenshot ${DEVICE_NAME}" "$device_type" "$runtime_id")"
          fi
          xcrun simctl boot "$simulator_id" || true
          xcrun simctl bootstatus "$simulator_id" -b
          destination="id=$simulator_id"
          echo "Using destination: $destination"
          {
            echo "destination<<EOF"
            echo "$destination"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare screenshot directory
        run: |
          mkdir -p build/screenshots
          cp Resources/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png build/screenshots/00-app-icon.png

      - name: Capture full app screenshots
        env:
          API_BASE_URL: https://wikiquest.app
          REVENUECAT_IOS_API_KEY: ""
          APPLE_TEAM_ID: ""
          WIKIQUEST_SCREENSHOT_DIR: ${{ github.workspace }}/build/screenshots
        run: |
          xcodebuild \
            -project WikiQuest.xcodeproj \
            -scheme WikiQuest \
            -destination "${{ steps.screenshot-destination.outputs.destination }}" \
            -resultBundlePath build/WikiQuestScreenshotReview.xcresult \
            API_BASE_URL="$API_BASE_URL" \
            REVENUECAT_IOS_API_KEY="$REVENUECAT_IOS_API_KEY" \
            APPLE_TEAM_ID="$APPLE_TEAM_ID" \
            CODE_SIGNING_ALLOWED=NO \
            test \
            -only-testing:WikiQuestUITests/WikiQuestScreenshotTests

      - name: Capture App Clip screenshot
        env:
          API_BASE_URL: https://wikiquest.app
          APPLE_TEAM_ID: ""
          WIKIQUEST_SCREENSHOT_DIR: ${{ github.workspace }}/build/screenshots
        run: |
          xcodebuild \
            -project WikiQuest.xcodeproj \
            -scheme WikiQuestClip \
            -destination "${{ steps.screenshot-destination.outputs.destination }}" \
            -resultBundlePath build/WikiQuestClipScreenshotReview.xcresult \
            API_BASE_URL="$API_BASE_URL" \
            APPLE_TEAM_ID="$APPLE_TEAM_ID" \
            CODE_SIGNING_ALLOWED=NO \
            test \
            -only-testing:WikiQuestClipUITests/WikiQuestClipScreenshotTests

      - name: Upload screenshot review artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wikiquest-screenshot-review
          path: |
            build/screenshots
            build/WikiQuestScreenshotReview.xcresult
            build/WikiQuestClipScreenshotReview.xcresult
          if-no-files-found: warn
