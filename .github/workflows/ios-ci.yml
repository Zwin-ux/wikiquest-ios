name: iOS CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Node dependencies
        run: |
          corepack enable
          corepack pnpm@10 install --frozen-lockfile

      - name: Verify generated assets
        run: |
          corepack pnpm@10 run assets:wikiquest
          corepack pnpm@10 run typecheck

      - name: Select Xcode
        run: |
          XCODE_PATH="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' | sort | tail -n 1)"
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version
          xcodebuild -showsdks
          if ! xcodebuild -showsdks | grep -Eq "iphoneos26|iOS 26"; then
            echo "App Store Connect now requires uploads built with the iOS 26 SDK or later."
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate --spec project.yml

      - name: Resolve iOS simulator destination
        id: ios-destination
        run: |
          destinations="$(xcodebuild -project WikiQuest.xcodeproj -scheme WikiQuest -showdestinations 2>/dev/null || true)"
          line="$(printf "%s\n" "$destinations" | grep 'platform:iOS Simulator' | grep 'iPhone' | grep -v 'Any iOS Simulator Device' | head -n 1 || true)"
          if [ -z "$line" ]; then
            line="$(printf "%s\n" "$destinations" | grep 'platform:iOS Simulator' | grep -v 'Any iOS Simulator Device' | head -n 1 || true)"
          fi
          if [ -n "$line" ]; then
            simulator_id="$(printf "%s" "$line" | sed -E 's/.*id:([^,}]+).*/\1/' | xargs)"
            if [ -n "$simulator_id" ] && [ "$simulator_id" != "$line" ]; then
              destination="id=$simulator_id"
            else
              destination="generic/platform=iOS Simulator"
            fi
          else
            destination="generic/platform=iOS Simulator"
          fi
          echo "Using destination: $destination"
          {
            echo "destination<<EOF"
            echo "$destination"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build iOS app
        env:
          API_BASE_URL: https://wikiquest.app
          REVENUECAT_IOS_API_KEY: ""
          APPLE_TEAM_ID: ""
        run: |
          xcodebuild \
            -project WikiQuest.xcodeproj \
            -scheme WikiQuest \
            -destination "${{ steps.ios-destination.outputs.destination }}" \
            API_BASE_URL="$API_BASE_URL" \
            REVENUECAT_IOS_API_KEY="$REVENUECAT_IOS_API_KEY" \
            APPLE_TEAM_ID="$APPLE_TEAM_ID" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build App Clip
        env:
          API_BASE_URL: https://wikiquest.app
          APPLE_TEAM_ID: ""
        run: |
          xcodebuild \
            -project WikiQuest.xcodeproj \
            -scheme WikiQuestClip \
            -destination "${{ steps.ios-destination.outputs.destination }}" \
            API_BASE_URL="$API_BASE_URL" \
            APPLE_TEAM_ID="$APPLE_TEAM_ID" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test iOS unit suite
        env:
          API_BASE_URL: https://wikiquest.app
          REVENUECAT_IOS_API_KEY: ""
          APPLE_TEAM_ID: ""
        run: |
          destination="${{ steps.ios-destination.outputs.destination }}"
          if [ "$destination" = "generic/platform=iOS Simulator" ]; then
            xcodebuild \
              -project WikiQuest.xcodeproj \
              -scheme WikiQuest \
              -destination "$destination" \
              API_BASE_URL="$API_BASE_URL" \
              REVENUECAT_IOS_API_KEY="$REVENUECAT_IOS_API_KEY" \
              APPLE_TEAM_ID="$APPLE_TEAM_ID" \
              CODE_SIGNING_ALLOWED=NO \
              build-for-testing
            exit 0
          fi
          xcodebuild \
            -project WikiQuest.xcodeproj \
            -scheme WikiQuest \
            -destination "$destination" \
            API_BASE_URL="$API_BASE_URL" \
            REVENUECAT_IOS_API_KEY="$REVENUECAT_IOS_API_KEY" \
            APPLE_TEAM_ID="$APPLE_TEAM_ID" \
            CODE_SIGNING_ALLOWED=NO \
            test \
            -only-testing:WikiQuestTests

      - name: Test App Clip
        env:
          API_BASE_URL: https://wikiquest.app
          APPLE_TEAM_ID: ""
        run: |
          destination="${{ steps.ios-destination.outputs.destination }}"
          command="test"
          test_flags=()
          if [ "$destination" = "generic/platform=iOS Simulator" ]; then
            command="build-for-testing"
          else
            test_flags=(-retry-tests-on-failure -test-iterations 2)
          fi
          xcodebuild \
            -project WikiQuest.xcodeproj \
            -scheme WikiQuestClip \
            -destination "$destination" \
            API_BASE_URL="$API_BASE_URL" \
            APPLE_TEAM_ID="$APPLE_TEAM_ID" \
            CODE_SIGNING_ALLOWED=NO \
            "$command" \
            "${test_flags[@]}"
